name: Build & Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  AZURE_WEBAPP_NAME: servio-web   # ← change to your App Service name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Install all workspace dependencies (client + server)
      - name: Install dependencies
        run: npm ci

      # Build the React SPA → client/dist
      - name: Build client
        run: npm run build

      # Generate the Prisma client for the target platform
      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate --schema=prisma/schema.prisma

      # Drop dev-only packages from root node_modules (client build tools, nodemon, etc.)
      # Must run AFTER the client build step so vite/etc. are still available during build.
      - name: Prune dev dependencies
        run: npm prune --omit=dev

      # Package only what the server needs at runtime:
      #   - root package.json + node_modules (hoisted by npm workspaces — contains express, prisma, etc.)
      #   - server/src + prisma + package.json + its own node_modules (anything not hoisted)
      #   - client/dist (served as static files by Express)
      - name: Create deployment zip
        run: |
          zip -r release.zip \
            package.json \
            node_modules \
            server/src \
            server/prisma \
            server/package.json \
            server/node_modules \
            client/dist \
            --exclude "**/.env*" "**/.env"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
